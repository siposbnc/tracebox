name: Release

# Builds the Windows installer and publishes it to a GitHub release whenever a
# version tag (e.g. v1.0.1) is pushed. Signing happens automatically only if the
# CSC_LINK / CSC_KEY_PASSWORD repository secrets are set; without them the build
# still succeeds and produces an unsigned installer.
on:
  push:
    tags:
      - "v*.*.*"

# Needed for electron-builder to create/update the GitHub release.
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION. Bump \"version\" in package.json before tagging."
            exit 1
          fi

      # Pre-create the draft so electron-builder reuses it. Without this, its
      # parallel artifact uploads can each create a draft, splitting the assets
      # (installer / blockmap / latest.yml) across duplicate releases.
      - name: Create draft release
        shell: bash
        run: gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --draft --title "$GITHUB_REF_NAME" --notes "Release $GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish installer
        run: npm run release
        env:
          # Provided automatically by GitHub Actions; lets electron-builder
          # reuse the draft above and upload assets.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional code signing — see SIGNING.md. Absent secrets => unsigned build.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
