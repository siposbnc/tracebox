appId: io.tracebox.app
productName: TraceBox
copyright: TraceBox

# Where `npm run release` (and CI) publishes the installer.
# Creates a draft GitHub release for the matching tag; review and publish it.
publish:
  provider: github
  owner: siposbnc
  repo: tracebox

directories:
  output: release
  buildResources: build

# The renderer is fully bundled by Vite and the backend by esbuild —
# no node_modules are shipped.
files:
  - dist/**/*
  - dist-electron/**/*
  - electron/main.cjs
  - electron/preload.cjs

asar: true

win:
  target:
    - nsis
  icon: build/icon.ico
  # Code signing is driven by the CSC_LINK / CSC_KEY_PASSWORD environment
  # variables (no secrets stored here). If unset, the build is unsigned.
  # See SIGNING.md for local self-signed testing and using a real certificate.
  # Registers TraceBox as an openable application for these types
  # (adds it to the "Open with" list and enables double-click open).
  fileAssociations:
    - ext: log
      name: Log File
      description: Log file
      role: Viewer
    - ext: jsonl
      name: JSON Lines Log
      description: JSON Lines log file
      role: Viewer
    - ext: ndjson
      name: NDJSON Log
      description: Newline-delimited JSON log file
      role: Viewer

nsis:
  oneClick: true
  perMachine: false
  runAfterFinish: true
  deleteAppDataOnUninstall: false
  # adds the explicit right-click "Open with TraceBox" verbs
  include: build/installer.nsh
