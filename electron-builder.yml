appId: io.tracebox.app
productName: TraceBox
copyright: TraceBox

# Where `npm run release` (and CI) publishes the installer.
# Creates a draft GitHub release for the matching tag; review and publish it.
publish:
  provider: github
  owner: siposbnc
  repo: tracebox

directories:
  output: release
  buildResources: build

# The renderer is fully bundled by Vite and the backend by esbuild —
# no node_modules are shipped.
files:
  - dist/**/*
  - dist-electron/**/*
  - electron/main.cjs
  - electron/preload.cjs

asar: true

win:
  target:
    - nsis
  icon: build/icon.ico
  # Code signing is driven by the CSC_LINK / CSC_KEY_PASSWORD environment
  # variables (no secrets stored here). If unset, the build is unsigned.
  # See SIGNING.md for local self-signed testing and using a real certificate.
  # Registers TraceBox as an openable application for these types
  # (adds it to the "Open with" list and enables double-click open).
  fileAssociations:
    - ext: log
      name: Log File
      description: Log file
      role: Viewer
    - ext: jsonl
      name: JSON Lines Log
      description: JSON Lines log file
      role: Viewer
    - ext: ndjson
      name: NDJSON Log
      description: Newline-delimited JSON log file
      role: Viewer

nsis:
  oneClick: true
  perMachine: false
  runAfterFinish: true
  deleteAppDataOnUninstall: false
  # adds the explicit right-click "Open with TraceBox" verbs
  include: build/installer.nsh

mac:
  # dmg for distribution, zip for auto-update (electron-updater needs the zip).
  target:
    - dmg
    - zip
  # electron-builder generates the .icns from this 1024px PNG.
  icon: build/icon.png
  category: public.app-category.developer-tools
  # Unsigned / un-notarized unless CSC_LINK (+ notarization secrets) are set;
  # Gatekeeper then needs a right-click → Open on first launch, and auto-update
  # is disabled for unsigned mac builds (Squirrel.Mac requires signing).
  fileAssociations:
    - ext: log
      name: Log File
      role: Viewer
    - ext: jsonl
      name: JSON Lines Log
      role: Viewer
    - ext: ndjson
      name: NDJSON Log
      role: Viewer

linux:
  target:
    - AppImage
  icon: build/icon.png
  category: Development
  synopsis: Fast, offline log reader for multi-gigabyte files
  maintainer: TraceBox <noreply@tracebox.io>
